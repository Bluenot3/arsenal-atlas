<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080" role="img" aria-label="Marketplace Commerce Flywheel">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="0.45" stop-color="#111827"/>
      <stop offset="1" stop-color="#10251f"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#2dd4bf"/></linearGradient>
    <linearGradient id="violet" x1="0" x2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#06b6d4"/></linearGradient>
    <linearGradient id="gold" x1="0" x2="1"><stop offset="0" stop-color="#f59e0b"/><stop offset="1" stop-color="#fef08a"/></linearGradient>
    <linearGradient id="green" x1="0" x2="1"><stop offset="0" stop-color="#16a34a"/><stop offset="1" stop-color="#34d399"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial; }
      .small { font-size: 15px; fill: #9fb0c8; font-weight: 600; }
      .tiny { font-size: 12px; fill: #7f91aa; font-weight: 700; letter-spacing: .08em; }
      .card { fill: rgba(15, 23, 42, .82); stroke: rgba(148, 163, 184, .34); stroke-width: 1.2; }
      .card2 { fill: rgba(8, 13, 24, .72); stroke: rgba(45, 212, 191, .32); stroke-width: 1.4; }
      .route { fill: rgba(14, 165, 233, .13); stroke: rgba(34, 211, 238, .52); stroke-width: 1; }
      .risk { fill: rgba(244, 63, 94, .14); stroke: rgba(251, 113, 133, .5); stroke-width: 1; }
      .money { fill: rgba(245, 158, 11, .14); stroke: rgba(251, 191, 36, .55); stroke-width: 1; }
    </style>
    
  </defs>
  <rect width="1800" height="1080" fill="url(#bg)"/>
  <g opacity=".16">
    <path d="M0 120 C300 30 520 220 860 100 S1450 40 1800 150" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <path d="M0 940 C360 820 720 1040 1800 900" fill="none" stroke="#34d399" stroke-width="2"/>
    <path d="M120 0 C60 300 210 600 80 1080" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <text x="70" y="78" class="label" font-size="38" font-weight="900" fill="#f8fafc">Marketplace Commerce Flywheel</text>
  <text x="72" y="112" class="label" font-size="18" font-weight="650" fill="#9fb0c8">How Arsenal assets can become a creator economy with commission and proof</text>
  <circle cx="900.0" cy="210.0" r="74" fill="rgba(15,23,42,.82)" stroke="rgba(34,211,238,.5)" stroke-width="2" filter="url(#shadow)"/>
