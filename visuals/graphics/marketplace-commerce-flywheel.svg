<path d="M578.3 613.4 Q900 540 581.9 452.2" fill="none" stroke="rgba(251,191,36,.34)" stroke-width="3"/>
<circle cx="642.0" cy="334.2" r="74" fill="rgba(15,23,42,.82)" stroke="rgba(34,211,238,.5)" stroke-width="2" filter="url(#shadow)"/>
<text x="642.0" y="326.2" text-anchor="middle" class="label" font-size="20" font-weight="950" fill="#f8fafc">Improve</text>
