<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000" role="img" aria-label="Arsenal Moat Map">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#06111f"/>
    <stop offset="42%" stop-color="#10233f"/>
    <stop offset="100%" stop-color="#161827"/>
  </linearGradient>
  <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.88"/>
    <stop offset="100%" stop-color="#0f172a" stop-opacity="0.94"/>
  </linearGradient>
  <linearGradient id="hot" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2dd4bf"/>
    <stop offset="52%" stop-color="#60a5fa"/>
    <stop offset="100%" stop-color="#f59e0b"/>
  </linearGradient>
  <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#22d3ee"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
  </marker>
</defs>
<rect width="1500" height="1000" fill="url(#bg)"/>
<rect x="18" y="18" width="1464" height="964" rx="22" fill="none" stroke="#334155" stroke-width="1.2" opacity="0.8"/>
<text x="42" y="64" fill="#f8fafc" font-size="31" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="42" dy="0">Arsenal Moat Map</tspan></text>
<text x="44" y="96" fill="#cbd5e1" font-size="14" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="44" dy="0">Defensive layers created by connected workspaces, proof, billing, governance, distribution, and Atlas intelligence.</tspan></text>
<rect x="160" y="175" width="1180" height="90" rx="18" fill="#0f172a" stroke="#f472b6" stroke-width="2" filter="url(#shadow)"/><rect x="160" y="175" width="10" height="90" rx="5" fill="#f472b6"/><text x="192" y="211" fill="#f472b6" font-size="20" font-weight="900" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="192" dy="0">Atlas Intelligence</tspan></text><text x="500" y="211" fill="#cbd5e1" font-size="14" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="500" dy="0">Maps, risks, offers, visuals, founder action queue</tspan></text><rect x="204" y="287" width="1092" height="90" rx="18" fill="#0f172a" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/><rect x="204" y="287" width="10" height="90" rx="5" fill="#22d3ee"/><text x="236" y="323" fill="#22d3ee" font-size="20" font-weight="900" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="236" dy="0">Distribution</tspan></text><text x="544" y="323" fill="#cbd5e1" font-size="14" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="544" dy="0">Public agents, embeds, partners, referrals, marketplace, programs</tspan></text><rect x="248" y="399" width="1004" height="90" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/><rect x="248" y="399" width="10" height="90" rx="5" fill="#a78bfa"/><text x="280" y="435" fill="#a78bfa" font-size="20" font-weight="900" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="280" dy="0">Control Plane</tspan></text><text x="588" y="435" fill="#cbd5e1" font-size="14" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="588" dy="0">AI Route, providers, limits, roles, credits, audit</tspan></text><rect x="292" y="511" width="916" height="90" rx="18" fill="#0f172a" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/><rect x="292" y="511" width="10" height="90" rx="5" fill="#f59e0b"/><text x="324" y="547" fill="#f59e0b" font-size="20" font-weight="900" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="324" dy="0">Revenue Spine</tspan></text><text x="632" y="547" fill="#cbd5e1" font-size="14" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="632" dy="0">Subscriptions, top-ups, paid access, Connect, commissions</tspan></text><rect x="336" y="623" width="828" height="90" rx="18" fill="#0f172a" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/><rect x="336" y="623" width="10" height="90" rx="5" fill="#34d399"/><text x="368" y="659" fill="#34d399" font-size="20" font-weight="900" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="368" dy="0">Proof Layer</tspan></text><text x="676" y="659" fill="#cbd5e1" font-size="14" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="676" dy="0">Vault, files, versions, replays, reports, portal exports</tspan></text><rect x="380" y="735" width="740" height="90" rx="18" fill="#0f172a" stroke="#2dd4bf" stroke-width="2" filter="url(#shadow)"/><rect x="380" y="735" width="10" height="90" rx="5" fill="#2dd4bf"/><text x="412" y="771" fill="#2dd4bf" font-size="20" font-weight="900" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="412" dy="0">Operating Workspaces</tspan></text><text x="720" y="771" fill="#cbd5e1" font-size="14" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="720" dy="0">Business Spaces, agents, Z-Engine, Arsenals, automations</tspan></text><rect x="90" y="875" width="620" height="72" rx="14" fill="url(#card)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/><rect x="90" y="875" width="5" height="72" rx="3" fill="#2dd4bf"/><text x="108" y="907" fill="#f8fafc" font-size="15" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="108" dy="0">Moat insight</tspan></text><text x="108" y="937" fill="#cbd5e1" font-size="12" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="108" dy="0">The moat is not one feature. It is the connection between workspace,</tspan><tspan x="108" dy="15">proof, revenue, governance, distribution, and Atlas clarity.</tspan></text><rect x="790" y="875" width="620" height="72" rx="14" fill="url(#card)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/><rect x="790" y="875" width="5" height="72" rx="3" fill="#f59e0b"/><text x="808" y="907" fill="#f8fafc" font-size="15" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="808" dy="0">Reinforcement</tspan></text><text x="808" y="937" fill="#cbd5e1" font-size="12" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="808" dy="0">Make every demo create proof, every proof create distribution, and</tspan><tspan x="808" dy="15">every routed AI call protect margin.</tspan></text><g transform="translate(0,958)"><text x="44" y="0" fill="#94a3b8" font-size="12" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="44" dy="0">Arsenal Atlas strategic leverage layer</tspan></text><text x="1456" y="0" fill="#64748b" font-size="11" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="end">Public Atlas artifact. No secrets or customer data.</text></g></svg>
