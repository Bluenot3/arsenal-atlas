      .risk { fill: rgba(244, 63, 94, .14); stroke: rgba(251, 113, 133, .5); stroke-width: 1; }
      .money { fill: rgba(245, 158, 11, .14); stroke: rgba(251, 191, 36, .55); stroke-width: 1; }
