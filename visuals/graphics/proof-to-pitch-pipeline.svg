acity="0.22" stroke="#34d399" stroke-width="2"/><text x="1095" y="275" fill="#34d399" font-size="20" font-weight="900" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">5</text><text x="1024" y="348" fill="#f8fafc" font-size="20" font-weight="900" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="1024" dy="0">Publish</tspan></text><text x="1024" y="392" fill="#cbd5e1" font-size="13" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="1024" dy="0">Client portal,</tspan><tspan x="1024" dy="16">public page, deck</tspan><tspan x="1024" dy="16">slide, partner proof</tspan></text><path d="M1195 405 L1225 405" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)" opacity="0.75"/><rect x="1232" y="300" width="190" height="210" rx="18" fill="#0f172a" stroke="#f472b6" stroke-width="2" filter="url(#shadow)"/><circle cx="1327" cy="265" r="28" fill="#f472b6" opacity="0.22" stroke="#f472b6" stroke-width="2"/><text x="1327" y="275" fill="#f472b6" font-size="20" font-weight="900" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">6</text><text x="1256" y="348" fill="#f8fafc" font-size="20" font-weight="900" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="1256" dy="0">Convert</tspan></text><text x="1256" y="392" fill="#cbd5e1" font-size="13" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="1256" dy="0">Setup fee,</tspan><tspan x="1256" dy="16">subscription,</tspan><tspan x="1256" dy="16">credits, referral,</tspan><tspan x="1256" dy="16">marketplace sale</tspan></text><rect x="95" y="620" width="390" height="112" rx="14" fill="url(#card)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/><rect x="95" y="620" width="5" height="112" rx="3" fill="#2dd4bf"/><text x="113" y="652" fill="#f8fafc" font-size="15" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="113" dy="0">Marketing use</tspan></text><text x="113" y="682" fill="#cbd5e1" font-size="12" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="113" dy="0">Build a carousel or landing section from</tspan><tspan x="113" dy="15">this pipeline: show source, plan, run,</tspan><tspan x="113" dy="15">proof, publish, conversion.</tspan></text><rect x="555" y="620" width="390" height="112" rx="14" fill="url(#card)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/><rect x="555" y="620" width="5" height="112" rx="3" fill="#f59e0b"/><text x="573" y="652" fill="#f8fafc" font-size="15" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="573" dy="0">Sales use</tspan></text><text x="573" y="682" fill="#cbd5e1" font-size="12" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="573" dy="0">For each prospect, generate a tiny proof</tspan><tspan x="573" dy="15">bundle instead of sending generic AI</tspan><tspan x="573" dy="15">feature claims.</tspan></text><rect x="1015" y="620" width="390" height="112" rx="14" fill="url(#card)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/><rect x="1015" y="620" width="5" height="112" rx="3" fill="#a78bfa"/><text x="1033" y="652" fill="#f8fafc" font-size="15" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="1033" dy="0">Investor use</tspan></text><text x="1033" y="682" fill="#cbd5e1" font-size="12" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="1033" dy="0">Show that outputs become durable assets,</tspan><tspan x="1033" dy="15">not disposable generations.</tspan></text><g transform="translate(0,918)"><text x="44" y="0" fill="#94a3b8" font-size="12" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="start" opacity="1"><tspan x="44" dy="0">Arsenal Atlas strategic leverage layer</tspan></text><text x="1456" y="0" fill="#64748b" font-size="11" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="end">Public Atlas artifact. No secrets or customer data.</text></g></svg>
